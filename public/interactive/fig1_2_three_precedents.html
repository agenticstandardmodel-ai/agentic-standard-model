<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 1.2 — Three Frameworks, One Method</title>
<style>
  body { margin: 0; padding: 24px; font-family: Arial, sans-serif; background: #f5f7fa; }
  svg { display: block; width: 100%; max-width: 900px; margin: 0 auto; }
  .th { font: 500 14px Arial, sans-serif; }
  .ts { font: 400 12px Arial, sans-serif; }
</style>
</head>
<body>
<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">

<text class="th" x="340" y="18" text-anchor="middle" fill="#1a1a2e">Three frameworks, one method</text>

<!-- Box 1: Mendeleev -->
<rect x="16" y="36" width="200" height="252" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<rect x="16" y="36" width="200" height="36" rx="8" fill="#854F0B"/>
<rect x="16" y="58" width="200" height="14" fill="#854F0B"/>
<text class="th" x="116" y="56" text-anchor="middle" fill="#FAEEDA" dominant-baseline="central">Mendeleev 1869</text>

<rect x="24" y="90" width="184" height="20" rx="3" fill="#FAC775" opacity="0.5"/>
<text class="th" x="116" y="100" text-anchor="middle" fill="#633806" dominant-baseline="central">Problem</text>
<text class="ts" x="116" y="124" text-anchor="middle" fill="#333">60+ elements,</text>
<text class="ts" x="116" y="140" text-anchor="middle" fill="#333">no systematic theory</text>

<rect x="24" y="158" width="184" height="20" rx="3" fill="#FAC775" opacity="0.5"/>
<text class="th" x="116" y="168" text-anchor="middle" fill="#633806" dominant-baseline="central">Contribution</text>
<text class="ts" x="116" y="192" text-anchor="middle" fill="#555" font-style="italic">Structure + commit to gaps</text>
<text class="ts" x="116" y="208" text-anchor="middle" fill="#555" font-style="italic">as predictions. Taxonomy</text>
<text class="ts" x="116" y="224" text-anchor="middle" fill="#555" font-style="italic">that predicts, not just</text>
<text class="ts" x="116" y="240" text-anchor="middle" fill="#555" font-style="italic">classifies.</text>

<!-- Box 2: Standard Model -->
<rect x="240" y="36" width="200" height="252" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="240" y="36" width="200" height="36" rx="8" fill="#0C447C"/>
<rect x="240" y="58" width="200" height="14" fill="#0C447C"/>
<text class="th" x="340" y="56" text-anchor="middle" fill="#E6F1FB" dominant-baseline="central">Standard model</text>

<rect x="248" y="90" width="184" height="20" rx="3" fill="#B5D4F4" opacity="0.5"/>
<text class="th" x="340" y="100" text-anchor="middle" fill="#042C53" dominant-baseline="central">Problem</text>
<text class="ts" x="340" y="124" text-anchor="middle" fill="#333">Why does the table have</text>
<text class="ts" x="340" y="140" text-anchor="middle" fill="#333">the structure it does?</text>

<rect x="248" y="158" width="184" height="20" rx="3" fill="#B5D4F4" opacity="0.5"/>
<text class="th" x="340" y="168" text-anchor="middle" fill="#042C53" dominant-baseline="central">Contribution</text>
<text class="ts" x="340" y="192" text-anchor="middle" fill="#555" font-style="italic">Fermion vs boson: matter</text>
<text class="ts" x="340" y="208" text-anchor="middle" fill="#555" font-style="italic">vs force. Taxonomy is</text>
<text class="ts" x="340" y="224" text-anchor="middle" fill="#555" font-style="italic">demanded by deeper</text>
<text class="ts" x="340" y="240" text-anchor="middle" fill="#555" font-style="italic">physics.</text>

<!-- Box 3: OSI -->
<rect x="464" y="36" width="200" height="252" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="464" y="36" width="200" height="36" rx="8" fill="#085041"/>
<rect x="464" y="58" width="200" height="14" fill="#085041"/>
<text class="th" x="564" y="56" text-anchor="middle" fill="#E1F5EE" dominant-baseline="central">OSI model 1984</text>

<rect x="472" y="90" width="184" height="20" rx="3" fill="#9FE1CB" opacity="0.5"/>
<text class="th" x="564" y="100" text-anchor="middle" fill="#04342C" dominant-baseline="central">Problem</text>
<text class="ts" x="564" y="124" text-anchor="middle" fill="#333">Network complexity:</text>
<text class="ts" x="564" y="140" text-anchor="middle" fill="#333">where do boundaries go?</text>

<rect x="472" y="158" width="184" height="20" rx="3" fill="#9FE1CB" opacity="0.5"/>
<text class="th" x="564" y="168" text-anchor="middle" fill="#04342C" dominant-baseline="central">Contribution</text>
<text class="ts" x="564" y="192" text-anchor="middle" fill="#555" font-style="italic">Layer boundaries from</text>
<text class="ts" x="564" y="208" text-anchor="middle" fill="#555" font-style="italic">dependency relations,</text>
<text class="ts" x="564" y="224" text-anchor="middle" fill="#555" font-style="italic">not convention. Period</text>
<text class="ts" x="564" y="240" text-anchor="middle" fill="#555" font-style="italic">is derived, not assigned.</text>

<!-- Converging dashed lines to footer -->
<line x1="116" y1="290" x2="322" y2="308" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="340" y1="290" x2="340" y2="308" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="564" y1="290" x2="358" y2="308" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
<text class="th" x="340" y="314" text-anchor="middle" fill="#1a1a2e">ASM applies all three</text>
</svg>
</body>
</html>
