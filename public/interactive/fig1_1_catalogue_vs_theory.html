<!DOCTYPE html>

<style>

<text class="ts" x="161" y="228" text-anchor="middle" fill="#555">No shared vocabulary. No prediction.</text>

<text class="ts" x="161" y="260" text-anchor="middle" fill="#555">Every decision re-learned from scratch.</text>

<line x1="320" y1="147" x2="352" y2="147" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
