<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figure Placeholder</title>
    <style>
      :root {
        --bg: #f7f2e8;
        --surface: #fff;
        --line: #d9d0c1;
        --text: #1d1b18;
        --text-soft: #6b645a;
        --accent: #1a3a5c;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(1000px 500px at 0 0, #fff9ee, transparent 60%), var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .card {
        max-width: 700px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        padding: 1.2rem;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-family: "IBM Plex Serif", Georgia, serif;
      }
      p {
        color: var(--text-soft);
        line-height: 1.65;
      }
      code {
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Interactive Figure Placeholder</h1>
      <p>
        This figure endpoint is active and routed. Replace this file with the finalized interactive implementation
        when chapter assets are ready.
      </p>
      <p>
        Path: <code>/public/interactive/placeholder-figure.html</code>
      </p>
    </section>
  </body>
</html>
