  accessibility_summary: Matrix of open ASM questions and prediction status.
  legend_overview: This figure separates what ASM treats as confirmed from what remains predicted, contested, or open to falsification.
  legend_how_to_read: Read the matrix by confidence state, then by what evidence would confirm, revise, or falsify each structural claim.
