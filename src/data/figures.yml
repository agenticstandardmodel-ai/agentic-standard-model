- id: fig-3-1
  chapter: 3
  label: Figure 3.1
  title: Bond Type Legend
  caption: Interactive legend for six bond types and their architectural meaning.
  type: reference
  embed_mode: iframe
  source_path: /interactive/placeholder-figure.html
  share_path: /figures/fig-3-1/
  accessibility_summary: Bond notation reference with examples and structural definitions.
  legend_overview: This figure defines the bond notation used throughout the chemistry layer so molecule formulas can be read as structural claims rather than decorative diagrams.
  legend_how_to_read: "Match each line treatment to its semantic meaning: covalent for load-bearing, ionic for optional, protocol for boson-mediated exchange, double bond for identity-defining structure, feedback loop for adaptation, and absent-by-design for guaranteed omission."
  legend_why_it_matters: Without a stable bond legend, molecule formulas collapse into pictures. The legend gives the notation interpretive precision.
  legend_callouts:
    - Bond types encode function, not visual flourish.
    - Double bonds signal identity-defining constraints.
    - Absent-by-design notation marks guarantees, not missing features.

