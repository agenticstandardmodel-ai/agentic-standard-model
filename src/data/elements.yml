- symbol: Ce
  name: Code Execution Environment
  number: 1
  group: Infrastructure
  period: P1
  kind: element
  description: "Raw sequential computation. CPU and RAM at the sub-atomic level. The substrate of all computation inside an agent."

- symbol: Fs
  name: File System Environment
  number: 2
  group: Infrastructure
  period: P1
  kind: element
  description: "Unstructured persistent storage. Bytes, files, and artifacts that survive process boundaries. Imposes no schema."

- symbol: Db
  name: Structured Data Store
  number: 3
  group: Infrastructure
  period: P1
  kind: element
  description: "Schema-governed, queryable, transactional storage. Enables precise retrieval, joins, and transactional integrity."

- symbol: Ex
  name: External System Interface
  number: 4
  group: Infrastructure
  period: P1
  kind: element
  description: "Network connectivity to APIs, queues, webhooks. The boundary between internal computation and the outside world."

- symbol: Es
  name: Execution State
  number: 5
  group: State
  period: P2
  kind: element
  description: "Transient data during active processing: intermediate outputs, current tool results, and active reasoning context."

- symbol: Ws
  name: Workflow State
  number: 6
  group: State
  period: P2
  kind: element
  description: "Position and control flow across multi-step processes. Carries a double bond in plan-and-execute compositions."

- symbol: Cp
  name: Checkpoint State
  number: 7
  group: State
  period: P2
  kind: element
  description: "Serialized snapshots of execution enabling pause, resume, replay, and recovery."

- symbol: Ss
  name: Session Memory
  number: 8
  group: Retention
  period: P3
  kind: element
  description: "Accumulated context of an active interaction: dialogue history, recent exchanges, and active preferences."

- symbol: Wm
  name: Working Memory
  number: 9
  group: Retention
  period: P3
  kind: element
  description: "Temporary task-specific artifacts during active execution. Task-scoped scratch space for intermediate results."

- symbol: Lm
  name: Large Language Model
  number: 10
  group: Cognition
  period: P4
  kind: element
  description: "Generates and interprets meaning. The cognitive substrate of every agent. The only element that reasons."

- symbol: Ec
  name: Encoder / Embedding
  number: 11
  group: Cognition
  period: P4
  kind: element
  description: "Encodes content into dense vector representations. Does not reason; it represents. Load-bearing in all RAG agents."

- symbol: Sm
  name: Semantic Memory
  number: 12
  group: Retention
  period: P5
  kind: element
  description: "Durable world knowledge as semantic vectors. Requires Ec to populate and Lm to query. The substrate of RAG pipelines."

- symbol: Pm
  name: Procedural Memory
  number: 13
  group: Retention
  period: P5
  kind: element
  description: "Durable knowledge of how work should be performed: playbooks, rulebooks, SOPs, and multi-step protocols."

- symbol: Em
  name: Episodic Memory
  number: 14
  group: Retention
  period: P5
  kind: element
  description: "Records of prior executions, feedback signals, and corrections generated by the collision of traces with correction signals."

- symbol: Rt
  name: Read Tool
  number: 15
  group: Action
  period: P5
  kind: element
  description: "Observational access to external state. Retrieves information without mutating it."

- symbol: Wt
  name: Write Tool
  number: 16
  group: Action
  period: P5
  kind: element
  description: "Mutational access to external state. Performs actions that change something in the world outside the agent."

- symbol: Lt
  name: Logic Tool
  number: 17
  group: Action
  period: P5
  kind: element
  description: "Deterministic computation and transformation. Executes code and performs mathematical operations."

- symbol: Ct
  name: Communication Tool
  number: 18
  group: Action
  period: P5
  kind: element
  description: "Emits information outward to humans or systems. Directed at an interpreter rather than a storage target."

- symbol: Is
  name: Information Skill
  number: 19
  group: Pattern
  period: P6
  kind: element
  description: "Extracting, identifying, labeling, and classifying. Structures Lm output when the task is to identify what something is."

- symbol: Ts
  name: Transformation Skill
  number: 20
  group: Pattern
  period: P6
  kind: element
  description: "Condensing, reorganizing, and normalizing. Changes the form of content without changing its substance."

- symbol: Gs
  name: Generation Skill
  number: 21
  group: Pattern
  period: P6
  kind: element
  description: "Producing new artifacts, language, and code. Structures Lm output when the task is to create something new."

- symbol: Ds
  name: Decision Skill
  number: 22
  group: Pattern
  period: P6
  kind: element
  description: "Routing, evaluating, and prioritizing. Structures Lm output when the task is to choose between options."

- symbol: ?s
  name: Interaction Skill
  number: "??"
  group: Pattern
  period: P6
  kind: predicted-gap
  description: "Predicted gap. Real-time engagement adapting dynamically within a live exchange, distinct from Generation Skill."

- symbol: Mc
  name: Tool Invocation Protocol
  number: Mc
  group: Exchange
  period: null
  kind: boson
  description: "Mediates contract-declared discovery and invocation between cognitive elements and tool molecules. Carries data and execution, not intent or authority."
  current_instantiation: MCP

- symbol: A2
  name: Governed Delegation Protocol
  number: A2
  group: Exchange
  period: null
  kind: boson
  description: "Mediates intent-and-authority-carrying delegation between registered cognitive molecules. Agent-to-tool interaction is Mc, not A2."
  current_instantiation: A2A

- symbol: A3
  name: Human Interface Protocol
  number: A3
  group: Exchange
  period: null
  kind: boson
  description: "Mediates delivery of legible output to the human whose intent initiated execution. The only boson that closes an intent chain."

- symbol: A2T
  name: Termination Boson
  number: A2T
  group: Exchange
  period: null
  kind: predicted-gap
  description: "Predicted exchange-family gap in the weak agentic force family, structurally implied as a termination counterpart to governed delegation."
