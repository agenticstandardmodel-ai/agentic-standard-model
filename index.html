<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Textbook</title>
    <meta
      name="description"
      content="An interactive textbook template for GitHub Pages with chapter navigation, quizzes, and progress tracking."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-glow" aria-hidden="true"></div>

    <header class="site-header">
      <div>
        <p class="eyebrow">Interactive Textbook Template</p>
        <h1 id="bookTitle">Agentic Systems Handbook</h1>
      </div>
      <p class="subtitle" id="bookSubtitle">
        Learn by reading, answering checks, and tracking your own progress.
      </p>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="Chapters">
        <div class="sidebar-top">
          <label for="chapterSearch" class="sr-only">Search chapters</label>
          <input id="chapterSearch" type="search" placeholder="Search chapters..." />
          <div class="progress-card">
            <p>Overall Progress</p>
            <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <span id="overallProgressBar"></span>
            </div>
            <strong id="overallProgressLabel">0%</strong>
          </div>
        </div>
        <ol id="chapterList" class="chapter-list"></ol>
      </aside>

      <section class="content" aria-live="polite">
        <article id="chapterContent" class="chapter-content"></article>
      </section>
    </main>

    <template id="quizQuestionTemplate">
      <fieldset class="quiz-question">
        <legend></legend>
        <div class="options"></div>
        <p class="feedback" hidden></p>
      </fieldset>
    </template>

    <script src="app.js"></script>
  </body>
</html>
